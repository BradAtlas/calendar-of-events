<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">
    <header class="max-w-4xl mx-auto mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Event Dashboard</h1>
        <div id="filter-container" class="mt-4 flex gap-2 flex-wrap">
            <button onclick="filterEvents('all')" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">All</button>
        </div>
    </header>

    <main id="timeline-container" class="max-w-4xl mx-auto space-y-6">
        <p class="text-gray-500">Loading library data...</p>
    </main>

    <script>
        let allEvents = [];
        let sources = [];

        async function init() {
            try {
                // Fetch the manifest to get the list of files
                const manifestResponse = await fetch('data/event_data_manifest.json');
                const manifest = await manifestResponse.json();
                sources = manifest.sources;

                // Create buttons dynamically
                const filterContainer = document.getElementById('filter-container');
                sources.forEach(source => {
                    const btn = document.createElement('button');
                    btn.innerText = source.city;
                    btn.className = "bg-white border border-gray-300 px-4 py-2 rounded-lg hover:bg-gray-200";
                    btn.onclick = () => filterEvents(source.city);
                    filterContainer.appendChild(btn);
                });

                // Fetch all source files
                const results = await Promise.all(
                    sources.map(s => fetch(s.file).then(r => r.json()))
                );

                // Combine all events
                allEvents = results.flatMap(data => data.events);
                renderEvents(allEvents);

            } catch (err) {
                document.getElementById('timeline-container').innerHTML = 
                    `<div class="bg-red-100 p-4 rounded text-red-700">Error: Could not load data. Ensure your manifest and JSON files are properly linked.</div>`;
                console.error(err);
            }
        }

        function renderEvents(events) {
            const container = document.getElementById('timeline-container');
            if (events.length === 0) {
                container.innerHTML = "<p class='text-gray-500'>No events found.</p>";
                return;
            }

            container.innerHTML = events.map(event => `
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900">${event.title}</h3>
                            <p class="text-blue-600 font-medium mt-1">${event.date} at ${event.time}</p>
                            <p class="text-gray-600 mt-2 text-sm">${event.location}</p>
                        </div>
                        <span class="bg-gray-100 text-gray-600 px-3 py-1 rounded-full text-xs font-semibold">${event.city}</span>
                    </div>
                    <a href="${event.url}" class="inline-block mt-4 text-blue-600 font-semibold hover:underline" target="_blank">View Details →</a>
                </div>
            `).join('');
        }

        function filterEvents(city) {
            if (city === 'all') {
                renderEvents(allEvents);
            } else {
                const filtered = allEvents.filter(e => e.city === city);
                renderEvents(filtered);
            }
        }

        init();
    </script>
</body>
</html>
