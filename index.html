<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans p-8">
    <header class="mb-8">
        <h2 class="text-2xl font-semibold">Upcoming Timeline</h2>
    </header>

    <div id="timeline-container" class="space-y-4">
        <!-- Events will load here -->
    </div>

    <script>
        async function loadEvents() {
            try {
                const response = await fetch('data/novi_library.json');
                const data = await response.json();
                const container = document.getElementById('timeline-container');

                container.innerHTML = data.events.map(event => `
                    <div class="bg-white p-4 rounded shadow border-l-4 border-blue-500">
                        <h3 class="font-bold">${event.title}</h3>
                        <p class="text-sm text-gray-600">${event.date} at ${event.time}</p>
                        <a href="${event.url}" class="text-blue-500 underline text-sm" target="_blank">View Details</a>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('timeline-container').innerHTML = "<p>Events loading... (Ensure your data file is in the /data folder!)</p>";
            }
        }
        loadEvents();
    </script>
</body>
</html>
